{% extends 'base.html' %}
{% block title %}Register – DCGP{% endblock %}
{% block content %}
<div class="form-wrap">
  <div class="form-card">
    <div class="form-title">Create Account</div>
    <div class="form-sub">Join DCGP to save bookmarks, track eligibility checks, and more.</div>
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 6 characters" minlength="6" required>
      </div>
      <button type="submit" class="btn-primary">Register</button>
    </form>
    <div class="form-link">Already have an account? <a href="/login">Login here</a></div>
  </div>
</div>
{% endblock %}
